version: 2

models:
  - name: mart_orders_summary
    description: "Resumen diario de pedidos, incluyendo ingresos totales y número de transacciones"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: mart_customer_ltv
    description: "Tabla final que consolida el LTV por cliente, calculando el gasto total y la frecuencia de compra"
    columns:
      - name: customer_id
        description: "Identificador único del cliente"
        tests:
          - unique
          - not_null  
      - name: email
        description: "Correo del cliente"
      - name: total_revenue
        description: "Suma total de ingresos generados por todas las compras del cliente"    
      - name: total_orders
        description: "Número total de pedidos realizados por el cliente"
      - name: customer_type
        description: "Categoría de cliente según su nivel de gasto (VIP, Regular, Nuevo)"